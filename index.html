<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개를 touch하새요</title>

<style>
  body {
    text-align: center;
    background: #fff;
  }

  img {
    width: 80%;
    max-width: 350px;
    cursor: pointer;
  }
  
  * {
    -webkit-tap-highlight-color: transparent;
  }

  img {
    user-select: none;
    -webkit-user-drag: none;
  }

  html {
    -webkit-tap-highlight-color: transparent;
  }

  .box {
    display: inline-block;
    background: #fff0f5;
    padding: 12px 16px;
    margin: 5px;
    border: 2px solid hotpink;
    border-radius: 10px;
    color: hotpink;
    font-weight: bold;
    font-size: 18px;
  }
</style>
</head>

<body>

  
<img src="dog_angry1.jpg" style="display:none;">
<img src="dog_angry2.jpg" style="display:none;">

<audio src="bark1.wav" style="display:none;"></audio>
<audio src="bark2.wav" style="display:none;"></audio>
  
<h2>개를 touch하새요</h2>

<img id="dog" src="dog.jpg">

<div>
  <div class="box" id="clicks">touch: 0</div>
  <div class="box" id="angry1">개는 분노합니다: 0</div>
  <div class="box" id="angry2">개는 분개합니다: 0</div>
</div>

<audio id="bark1" src="bark1.wav"></audio>
<audio id="bark2" src="bark2.wav"></audio>
<audio id="touch" src="touch.wav"></audio>

<script>
let clickCount = 0;
let angry1 = 0;
let angry2 = 0;
let angry = false;

const dog = document.getElementById("dog");
const touch = document.getElementById("touch");

dog.onclick = () => {

  // 😡 화난 상태면 클릭 무시
  if (angry) return;

  // 🔊 터치 소리 (한 번만!)
  touch.currentTime = 0;
  touch.play();

  // 👆 클릭 카운트
  clickCount++;
  document.getElementById("clicks").innerText = "touch: " + clickCount;

  // 🎲 화날 확률
if (Math.random() < 0.28) {

  let r = Math.random();
  angry = true;

  if (r < 0.85) {
    dog.src = "dog_angry1.jpg";

    const b1 = document.getElementById("bark1");
    b1.currentTime = 0;
    b1.play();

    angry1++;
    document.getElementById("angry1").innerText =
      "개는 분노합니다: " + angry1;

    setTimeout(() => {
      dog.src = "dog.jpg";
      angry = false;
    }, 1500);

  } else {
    dog.src = "dog_angry2.jpg";

    const b2 = document.getElementById("bark2");
    b2.currentTime = 0;
    b2.play();

    angry2++;
    document.getElementById("angry2").innerText =
      "개는 분개합니다: " + angry2;

    // 💥 게임 오버
    setTimeout(() => {
      alert("당신은 개에게 죽임을 당하다.");
      location.reload();
    }, 300);
  }
}
};
</script>
