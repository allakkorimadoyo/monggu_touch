<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개를 touch하새요</title>

<style>
  body {
    text-align: center;
    background: #fff;
  }

  img {
    width: 80%;
    max-width: 350px;
    cursor: pointer;
  }

  .box {
    display: inline-block;
    background: #fff0f5;
    padding: 12px 16px;
    margin: 5px;
    border: 2px solid hotpink;
    border-radius: 10px;
    color: hotpink;
    font-weight: bold;
    font-size: 18px;
  }
</style>
</head>

<body>

<!-- 🔥 프리로드 -->
<img src="dog_angry1.jpg" style="display:none;">
<img src="dog_angry2.jpg" style="display:none;">

<audio src="bark1.wav" style="display:none;"></audio>
<audio src="bark2.wav" style="display:none;"></audio>

<h2>개를 touch하새요 (touch)</h2>

<img id="dog" src="dog.jpg">

<div>
  <div class="box" id="clicks">touch하다: 0</div>
  <div class="box" id="angry1">개는 분노합니다: 0</div>
  <div class="box" id="angry2">개는 분개합니다: 0</div>
</div>

<audio id="bark1" src="bark1.wav"></audio>
<audio id="bark2" src="bark2.wav"></audio>

<script>
let clickCount = 0;
let angry1 = 0;
let angry2 = 0;
let angry = false;

const dog = document.getElementById("dog");

dog.onclick = () => {

  if (angry) return;

  // 👆 클릭 카운트
  clickCount++;
  document.getElementById("clicks").innerText =
    "touch하다: " + clickCount;

  // 🎲 전체 화 확률
  let r = Math.random();

  if (r < 0.27) {

    let type = Math.random();
    angry = true;

    // 💢 화1 (60%)
    if (type < 0.6) {
      dog.src = "dog_angry1.jpg";

      const b1 = document.getElementById("bark1");
      b1.currentTime = 0;
      b1.play();

      angry1++;
      document.getElementById("angry1").innerText =
        "개는 분노합니다: " + angry1;

      setTimeout(() => {
        dog.src = "dog.jpg";
        angry = false;
      }, 1600);

    }

    // 😡 화2 (40%)
    else {
      dog.src = "dog_angry2.jpg";

      const b2 = document.getElementById("bark2");
      b2.currentTime = 0;
      b2.play();

      angry2++;
      document.getElementById("angry2").innerText =
        "개는 분개합니다: " + angry2;

      setTimeout(() => {
        dog.src = "dog.jpg";
        angry = false;
      }, 500);
    }
  }
};
</script>

</body>
</html>
