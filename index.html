<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개를 touch하새요</title>

<style>
  body {
    text-align: center;
    background: #fff;
  }

  img {
    width: 80%;
    max-width: 350px;
    cursor: pointer;
    user-select: none;
    -webkit-user-drag: none;
    -webkit-tap-highlight-color: transparent;
  }

  .box {
    display: inline-block;
    background: #fff0f5;
    padding: 12px 16px;
    margin: 5px;
    border: 2px solid hotpink;
    border-radius: 10px;
    color: hotpink;
    font-weight: bold;
    font-size: 18px;
  }
</style>
</head>

<body>

<h2>개를 touch하새요</h2>

<img id="dog" src="dog.jpg">

<div>
  <div class="box" id="clicks">touch: 0</div>
  <div class="box" id="angry1">개는 분노합니다: 0</div>
</div>

<audio id="bark1" src="bark1.wav" preload="auto"></audio>
<audio id="bark2" src="bark2.wav" preload="auto"></audio>
<audio id="touch" src="touch.wav" preload="auto"></audio>

<script>
let clickCount = 0;
let angry1 = 0;
let angry = false;

const dog = document.getElementById("dog");
const touch = document.getElementById("touch");

dog.onclick = () => {

  if (angry) return;

  // 🔊 터치 소리
  touch.currentTime = 0;
  touch.play().catch(() => {});

  // 👆 클릭 증가
  clickCount++;
  document.getElementById("clicks").innerText = "touch: " + clickCount;

  // 🎲 이벤트 확률
  if (Math.random() < 0.25) {

    let r = Math.random();
    angry = true;

    // 😠 화1 (일반)
    if (r < 0.8) {
      dog.src = "dog_angry1.jpg";

      const b1 = document.getElementById("bark1");
      b1.currentTime = 0;
      b1.play().catch(() => {});

      angry1++;
      document.getElementById("angry1").innerText =
        "개는 분노합니다: " + angry1;

      setTimeout(() => {
        dog.src = "dog.jpg";
        angry = false;
      }, 1500);
    }

    // 💀 화2 = 게임오버
    else {
      dog.src = "dog_angry2.jpg";

      const b2 = document.getElementById("bark2");
      b2.currentTime = 0;
      b2.play().catch(() => {});

      angry = true;

      setTimeout(() => {
        alert("개가 당신을 물어뜯었습니다.\n" +
             "당신의 touch : " + clickCount);
        location.reload();
      }, 400);
    }
  }
};
</script>

</body>
</html>
