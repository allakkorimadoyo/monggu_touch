<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>개를 touch하새요</title>

<style>
  body {
    text-align: center;
    background: #fff;
  }

  img {
    width: 300px;
    cursor: pointer;
  }

  .box {
    display: inline-block;
    background: #fff0f5;
    padding: 10px;
    margin: 5px;
    border: 2px solid hotpink;
    border-radius: 10px;
    color: hotpink;
    font-weight: bold;
  }
</style>
</head>

<body>

<h2>개를 touch하새요</h2>

<img id="dog" src="dog.jpg">

<div>
  <div class="box" id="clicks">touch: 0</div>
  <div class="box" id="angry1">dog will be angry...: 0</div>
  <div class="box" id="angry2">dog was furious.: 0</div>
</div>

<audio id="bark1" src="bark1.wav"></audio>
<audio id="bark2" src="bark2.wav"></audio>

<script>
let clickCount = 0;
let angry1 = 0;
let angry2 = 0;
let angry = false;

const dog = document.getElementById("dog");

dog.onclick = () => {

  // 😡 화난 상태면 클릭 무시
  if (angry) return;

  // 👆 클릭 카운트
  clickCount++;
  document.getElementById("clicks").innerText = "touch: " + clickCount;

  // 🎲 화날 확률
  if (Math.random() < 0.28) {
    angry = true;

    let r = Math.random();

    // 😠 화1 (70%)
    if (r < 0.6) {
      dog.src = "dog_angry1.jpg";
      document.getElementById("bark1").play();

      angry1++;
      document.getElementById("angry1").innerText =
        "dog will be angry...: " + angry1;

      setTimeout(() => {
        dog.src = "dog.jpg";
        angry = false;
      }, 1500);

    // 💢 화2 (30%)
    } else {
      dog.src = "dog_angry2.jpg";
      document.getElementById("bark2").play();

      angry2++;
      document.getElementById("angry2").innerText =
        "dog was furious.: " + angry2;

      setTimeout(() => {
        dog.src = "dog.jpg";
        angry = false;
      }, 500);
    }
  }
};
</script>

</body>
</html>
